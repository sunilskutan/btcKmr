<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="KSRTC BTC Kilimanoor">
  <meta property="og:description" content="Budget Travel with Government Bus">
  <meta property="og:image" content="https://live.staticflickr.com/65535/54594991089_2bc7fcbfe4_z.jpg">
  <meta property="og:url" content="https://sunilskutan.github.io/btcKmr/">
  <meta property="og:type" content="website">
  <title>BTC Kilimanoor – Login</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Segoe UI', 'Tahoma', 'Geneva', 'Verdana', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body {
      background-image: url("https://live.staticflickr.com/65535/54594991089_2bc7fcbfe4_z.jpg");
      background-size: cover;
      background-position: center;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 1s linear infinite; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes slideRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
    .slide-in { animation: slideRight 0.3s ease forwards; }
  </style>

  <script src="fbc.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    document.addEventListener('DOMContentLoaded', () => {
      sessionStorage.setItem('isLogin', 'false');
      sessionStorage.setItem('userName', 'Guest');
      sessionStorage.setItem('userRole', '');
      sessionStorage.setItem('userid', 0);
      sessionStorage.setItem('userPassword', '');

      setTimeout(() => {
        document.getElementById('loader').style.display = 'none';
        const form = document.getElementById('loginForm');
        form.classList.remove('hidden');
        form.classList.add('fade-in');
      }, 1200);

      // Password toggle
      document.getElementById('togglePass').addEventListener('click', () => {
        const pw = document.getElementById('loginPassword');
        const icon = document.getElementById('togglePass');
        if (pw.type === 'password') {
          pw.type = 'text';
          icon.className = 'fas fa-eye text-gray-400 cursor-pointer';
        } else {
          pw.type = 'password';
          icon.className = 'fas fa-eye-slash text-gray-400 cursor-pointer';
        }
      });

      document.getElementById('loginPassword').addEventListener('keyup', e => {
        if (e.key === 'Enter') loginUser();
      });
    });

    window.loginUser = async function () {
      const username = document.getElementById('loginUsername').value.trim();
      const password = document.getElementById('loginPassword').value.trim();

      if (!username || !password) {
        showNotification('Please enter both username and password.', 'error');
        return;
      }

      const btn = document.getElementById('loginBtn');
      btn.innerHTML = '<i class="fas fa-spinner spin mr-2"></i>Logging in…';
      btn.disabled = true;

      try {
        const q = query(collection(db, "users"), where("userName", "==", username), where("userPassword", "==", password));
        const snap = await getDocs(q);

        if (!snap.empty) {
          const userData = snap.docs[0].data();
          sessionStorage.setItem('isLogin', 'true');
          sessionStorage.setItem('userName', userData.userName);
          sessionStorage.setItem('userRole', userData.userRole);
          sessionStorage.setItem('userid', userData.userid);
          sessionStorage.setItem('userPassword', userData.userPassword);
          showNotification('Welcome ' + userData.userName + '!', 'success');
          setTimeout(() => {
            window.location.href = `dashboard.html?userId=${userData.userid}&userRole=${userData.userRole}`;
          }, 1500);
        } else {
          showNotification('Invalid username or password.', 'error');
          btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Login';
          btn.disabled = false;
        }
      } catch (err) {
        console.error(err);
        showNotification('Something went wrong. Try again.', 'error');
        btn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Login';
        btn.disabled = false;
      }
    };

    window.showNotification = function (msg, type) {
      const n = document.getElementById('notification');
      n.textContent = msg;
      n.className = `fixed top-5 right-5 px-5 py-3 rounded-lg text-white font-medium shadow-lg slide-in z-50 ${type === 'success' ? 'bg-emerald-500' : 'bg-rose-500'}`;
      n.classList.remove('hidden');
      setTimeout(() => n.classList.add('hidden'), 3000);
    };
  </script>
</head>

<body class="min-h-screen flex items-center justify-center font-sans" oncontextmenu="return false;">

  <!-- Overlay -->
  <div class="absolute inset-0 bg-black/50"></div>

  <!-- Card -->
  <div class="relative z-10 bg-white rounded-2xl shadow-2xl w-full max-w-sm mx-4 px-8 py-10">

    <!-- Loader -->
    <div id="loader" class="flex flex-col items-center gap-3 py-8">
      <div class="w-9 h-9 border-4 border-gray-200 border-t-blue-600 rounded-full spin"></div>
      <p class="text-blue-600 text-sm font-medium">Loading BTC Kilimanoor…</p>
    </div>

    <!-- Form -->
    <div id="loginForm" class="hidden">

      <!-- Icon -->
      <div class="flex justify-center mb-5">
        <a href="https://www.instagram.com/btcksrtckilimanoor/" target="_blank"
           class="bg-blue-600 hover:bg-blue-700 transition w-16 h-16 rounded-full flex items-center justify-center shadow-lg">
          <i class="fas fa-bus text-white text-2xl"></i>
        </a>
      </div>

      <!-- Title -->
      <h1 class="text-2xl font-bold text-center text-blue-700 mb-1">BTC Kilimanoor</h1>
      <p class="text-center text-gray-400 text-xs mb-7">
        Budget Tourism Cell of
        <a href="https://www.facebook.com/KeralaStateRoadTransportCorporation" target="_blank" class="hover:underline">KSRTC</a>
        <a href="https://g.co/kgs/NrWA4c9" target="_blank" class="hover:underline"> Kilimanoor</a>
      </p>

      <!-- Username -->
      <div class="mb-4">
        <label class="block text-sm text-gray-500 mb-1" for="loginUsername">Username</label>
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-1/2 -translate-y-1/2 text-gray-300"></i>
          <input id="loginUsername" type="text" placeholder="Enter your username"
            class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition">
        </div>
      </div>

      <!-- Password -->
      <div class="mb-2">
        <label class="block text-sm text-gray-500 mb-1" for="loginPassword">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 -translate-y-1/2 text-gray-300"></i>
          <input id="loginPassword" type="password" placeholder="Enter your password"
            class="w-full pl-10 pr-10 py-3 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent transition">
          <i id="togglePass" class="fas fa-eye-slash text-gray-400 cursor-pointer absolute right-3 top-1/2 -translate-y-1/2"></i>
        </div>
      </div>

      <!-- Forgot -->
      <div class="text-right mb-6">
        <a href="tel:9633732363" class="text-xs text-blue-500 hover:underline">Forgot password?</a>
      </div>

      <!-- Buttons -->
      <button id="loginBtn" onclick="loginUser()"
        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold text-sm transition flex items-center justify-center gap-2 mb-3">
        <i class="fas fa-sign-in-alt"></i> Login
      </button>

      <div class="flex items-center gap-3 my-3">
        <div class="flex-1 h-px bg-gray-100"></div>
        <span class="text-xs text-gray-400">or</span>
        <div class="flex-1 h-px bg-gray-100"></div>
      </div>

      <button onclick="window.location.href='addUser.html'"
        class="w-full border border-gray-200 hover:bg-gray-50 text-gray-600 py-3 rounded-lg font-medium text-sm transition flex items-center justify-center gap-2 mb-3">
        <i class="fas fa-user-plus"></i> Sign Up
      </button>

      <button onclick="window.location.href='dashboard.html?userId=0'"
        class="w-full bg-sky-400 hover:bg-sky-500 text-white py-3 rounded-lg font-medium text-sm transition flex items-center justify-center gap-2">
        <i class="fas fa-chevron-right"></i> Continue as Guest
      </button>

      <!-- Footer -->
      <p class="text-center text-gray-300 text-[10px] mt-6">v2.2.1 · build 10.07.2025</p>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification" class="hidden fixed top-5 right-5 z-50"></div>

</body>
</html>
