<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Expired</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-12px); }
    }
    .float { animation: float 3s ease-in-out infinite; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.6s ease forwards; }
    .delay-1 { animation-delay: 0.1s; opacity: 0; }
    .delay-2 { animation-delay: 0.25s; opacity: 0; }
    .delay-3 { animation-delay: 0.4s; opacity: 0; }
    .delay-4 { animation-delay: 0.55s; opacity: 0; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center px-4">

  <div class="text-center max-w-md w-full">

    <!-- Icon -->
    <div class="float mb-8 fade-up delay-1">
      <div class="inline-flex items-center justify-center w-24 h-24 rounded-full bg-amber-100 border-4 border-amber-200">
        <svg class="w-12 h-12 text-amber-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M12 6v6l4 2m6-2a10 10 0 11-20 0 10 10 0 0120 0z" />
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-4xl font-bold text-slate-800 mb-2 fade-up delay-2">Page Expired</h1>

    <!-- Message -->
    <p class="text-slate-500 text-base mb-8 leading-relaxed fade-up delay-3">
      This page is no longer valid. It may have timed out or the session has ended.
      Please go back and try again.
    </p>

    <!-- Button -->
    <div class="fade-up delay-4">
      <button onclick="history.back()"
        class="inline-flex items-center gap-2 bg-amber-500 hover:bg-amber-600 active:scale-95 text-white font-semibold px-6 py-3 rounded-xl transition-all duration-200 shadow-md shadow-amber-200">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
        </svg>
        Go Back
      </button>
    </div>

    <!-- Footer note -->
    <p class="mt-10 text-slate-300 text-xs fade-up delay-4">Error 419 · Session Expired</p>

  </div>

</body>
</html>
